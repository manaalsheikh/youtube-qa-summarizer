<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AI Summarizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #312e81, transparent);
        }
        .container {
            width: 90%;
            max-width: 1000px;
            padding: 40px 0;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; display: none; }
        .video-container { width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; }
        .chat-box { height: 300px; overflow-y: auto; margin-bottom: 15px; padding: 10px; border-radius: 12px; background: rgba(0,0,0,0.2); }
        .message { margin-bottom: 10px; padding: 10px 15px; border-radius: 12px; max-width: 80%; }
        .user { background: var(--primary); align-self: flex-end; margin-left: auto; }
        .bot { background: rgba(255,255,255,0.1); }
        .loader { display: none; text-align: center; margin: 20px 0; }
        @media (max-width: 768px) { .result-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YouTube AI</h1>
            <p>Summarize videos and chat with content in seconds.</p>
        </div>

        <div class="card">
            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
                <button onclick="analyzeVideo()" id="analyzeBtn">Analyze</button>
            </div>
            <div class="loader" id="loader">Processing video... Please wait...</div>
        </div>

        <div class="result-grid" id="resultGrid">
            <div class="card">
                <h3>Summary</h3>
                <div id="summaryText" style="white-space: pre-line;"></div>
            </div>
            <div>
                <div class="card" style="padding: 0; overflow: hidden;">
                    <div class="video-container" id="videoFrame"></div>
                </div>
                <div class="card">
                    <h3>Chat</h3>
                    <div class="chat-box" id="chatBox"></div>
                    <div class="input-group">
                        <input type="text" id="chatInput" placeholder="Ask a question...">
                        <button onclick="askQuestion()">Ask</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTranscript="";
        let currentSummary="";

        async function analyzeVideo() {
            const url=document.getElementById('videoUrl').value;
            if(!url) return alert("Please enter a URL");

            document.getElementById('loader').style.display='block';
            document.getElementById('resultGrid').style.display='none';

            const formData=new FormData();
            formData.append('url',url);

            try {
                const response=await fetch('/analyze',{method:'POST',body:formData});
                const data=await response.json();
                
                if(data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('summaryText').innerText=data.summary;
                    document.getElementById('videoFrame').innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${data.video_id}" frameborder="0" allowfullscreen></iframe>`;
                    currentTranscript=data.transcript;
                    currentSummary=data.summary;
                    document.getElementById('resultGrid').style.display='grid';
                }
            } catch (err) {
                alert("Something went wrong. Check console.");
            } finally {
                document.getElementById('loader').style.display='none';
            }
        }

        async function askQuestion() {
            const question=document.getElementById('chatInput').value;
            if(!question) return;

            const chatBox=document.getElementById('chatBox');
            chatBox.innerHTML+=`<div class="message user">${question}</div>`;
            document.getElementById('chatInput').value='';

            const formData=new FormData();
            formData.append('question',question);
            formData.append('transcript',currentTranscript);
            formData.append('summary',currentSummary);

            const response=await fetch('/chat',{method:'POST',body:formData});
            const data=await response.json();
            
            chatBox.innerHTML+=`<div class="message bot">${data.response}</div>`;
            chatBox.scrollTop=chatBox.scrollHeight;
        }
    </script>
</body>
</html>
